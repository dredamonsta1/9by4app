<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StanBox">
  <defs>
    <!-- Mask: hides bars inside the record's outer circle so they visually
         emerge from the record's curved top edge, not from a flat line. -->
    <mask id="above-record" maskUnits="userSpaceOnUse">
      <rect width="400" height="400" fill="white"/>
      <circle cx="200" cy="260" r="131.5" fill="black"/>
    </mask>
  </defs>

  <!-- Bars extend down past the record's center; mask clips the interior
       portions. Bar tops descend linearly left→right (ranking metaphor). -->
  <g fill="#FFFFFF" mask="url(#above-record)">
    <rect x="82"  y="20"  width="8" height="270"/>
    <rect x="94"  y="27"  width="8" height="263"/>
    <rect x="106" y="34"  width="8" height="256"/>
    <rect x="118" y="41"  width="8" height="249"/>
    <rect x="130" y="47"  width="8" height="243"/>
    <rect x="142" y="54"  width="8" height="236"/>
    <rect x="154" y="61"  width="8" height="229"/>
    <rect x="166" y="68"  width="8" height="222"/>
    <rect x="178" y="75"  width="8" height="215"/>
    <rect x="190" y="82"  width="8" height="208"/>
    <rect x="202" y="88"  width="8" height="202"/>
    <rect x="214" y="95"  width="8" height="195"/>
    <rect x="226" y="102" width="8" height="188"/>
    <rect x="238" y="109" width="8" height="181"/>
    <rect x="250" y="116" width="8" height="174"/>
    <rect x="262" y="123" width="8" height="167"/>
    <rect x="274" y="129" width="8" height="161"/>
    <rect x="286" y="136" width="8" height="154"/>
    <rect x="298" y="143" width="8" height="147"/>
    <rect x="310" y="150" width="8" height="140"/>
  </g>

  <!-- Vinyl record — grooves + outer edge -->
  <g stroke="#FFFFFF" fill="none">
    <circle cx="200" cy="260" r="130" stroke-width="3"/>
    <circle cx="200" cy="260" r="122" stroke-width="1.5"/>
    <circle cx="200" cy="260" r="112" stroke-width="1.5"/>
    <circle cx="200" cy="260" r="102" stroke-width="1.5"/>
    <circle cx="200" cy="260" r="92"  stroke-width="1.5"/>
    <circle cx="200" cy="260" r="82"  stroke-width="1.5"/>
    <circle cx="200" cy="260" r="72"  stroke-width="1.5"/>
    <circle cx="200" cy="260" r="62"  stroke-width="1.5"/>
  </g>

  <!-- Chartreuse center label -->
  <circle cx="200" cy="260" r="55" fill="#D6FF3D"/>

  <!-- Spindle hole -->
  <circle cx="200" cy="260" r="3" fill="#0A1420"/>
</svg>
