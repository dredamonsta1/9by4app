<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StanBox logo mockup — box with chartreuse floating discs">
  <defs>
    <filter id="discShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============ BOX — small pedestal, facing viewer head-on ============ -->

  <!-- Front face — 120 wide × 40 tall, dead-on -->
  <rect x="140" y="340" width="120" height="40" fill="#A6ACB4"/>

  <!-- Top face — symmetric trapezoid, viewed from slightly above.
       No side face visible; box faces the viewer squarely. -->
  <polygon points="140,340 150,328 250,328 260,340" fill="#C4C9CF"/>

  <!-- StanBox wordmark on the front face -->
  <text x="200" y="370"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif"
        font-size="24"
        font-weight="800"
        fill="#FFFFFF"
        letter-spacing="0.2">StanBox</text>

  <!-- ============ TURNTABLE VINYL — centered on the new symmetric top face ============ -->
  <ellipse cx="200" cy="334" rx="52" ry="9" fill="#3E4249"/>
  <ellipse cx="200" cy="334" rx="42" ry="7" fill="none" stroke="#5A5F66" stroke-width="1"/>
  <ellipse cx="200" cy="334" rx="14" ry="2.4" fill="#7C818A"/>
  <circle cx="200" cy="334" r="1.5" fill="#0A1420"/>

  <!-- ============ 3 CHARTREUSE FLOATING DISCS — same size, now more dominant ============ -->

  <!-- Disc 1 — topmost (compressed toward Disc 2 for tighter cluster) -->
  <g transform="translate(155 180) rotate(-18)" filter="url(#discShadow)">
    <ellipse cx="0" cy="0" rx="42" ry="10" fill="#D6FF3D"/>
    <ellipse cx="0" cy="0" rx="10" ry="2.5" fill="#B8DE30"/>
    <circle cx="0" cy="0" r="1" fill="#0A1420"/>
  </g>

  <!-- Disc 2 — middle (equal 60px gap to each neighbor) -->
  <g transform="translate(235 240) rotate(15)" filter="url(#discShadow)">
    <ellipse cx="0" cy="0" rx="52" ry="13" fill="#D6FF3D"/>
    <ellipse cx="0" cy="0" rx="13" ry="3.2" fill="#B8DE30"/>
    <circle cx="0" cy="0" r="1.3" fill="#0A1420"/>
  </g>

  <!-- Disc 3 — lowest, hovering just above the box (unchanged) -->
  <g transform="translate(160 300) rotate(-12)" filter="url(#discShadow)">
    <ellipse cx="0" cy="0" rx="48" ry="11" fill="#D6FF3D"/>
    <ellipse cx="0" cy="0" rx="12" ry="2.8" fill="#B8DE30"/>
    <circle cx="0" cy="0" r="1.2" fill="#0A1420"/>
  </g>
</svg>
